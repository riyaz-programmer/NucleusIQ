name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:

  # ── Run full CI first ───────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Detect which packages have new versions ─────────────────────────
  check-versions:
    name: "Check which packages need publishing"
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      publish-core: ${{ steps.core.outputs.publish }}
      core-version: ${{ steps.core.outputs.version }}
      publish-openai: ${{ steps.openai.outputs.publish }}
      openai-version: ${{ steps.openai.outputs.version }}
      publish-gemini: ${{ steps.gemini.outputs.publish }}
      gemini-version: ${{ steps.gemini.outputs.version }}
      publish-anthropic: ${{ steps.anthropic.outputs.publish }}
      anthropic-version: ${{ steps.anthropic.outputs.version }}
      publish-groq: ${{ steps.groq.outputs.publish }}
      groq-version: ${{ steps.groq.outputs.version }}
      publish-ollama: ${{ steps.ollama.outputs.publish }}
      ollama-version: ${{ steps.ollama.outputs.version }}
      publish-mcp: ${{ steps.mcp.outputs.publish }}
      mcp-version: ${{ steps.mcp.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check nucleusiq
        id: core
        run: |
          VERSION=$(python -c "
          import re
          with open('src/nucleusiq/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/nucleusiq/${VERSION}/json")

          if [ "$STATUS" = "200" ]; then
            echo "nucleusiq $VERSION already on PyPI — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "nucleusiq $VERSION not on PyPI — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check nucleusiq-openai
        id: openai
        run: |
          VERSION=$(python -c "
          import re
          with open('src/providers/llms/openai/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/nucleusiq-openai/${VERSION}/json")

          if [ "$STATUS" = "200" ]; then
            echo "nucleusiq-openai $VERSION already on PyPI — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "nucleusiq-openai $VERSION not on PyPI — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check nucleusiq-gemini
        id: gemini
        run: |
          VERSION=$(python -c "
          import re
          with open('src/providers/llms/gemini/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/nucleusiq-gemini/${VERSION}/json")

          if [ "$STATUS" = "200" ]; then
            echo "nucleusiq-gemini $VERSION already on PyPI — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "nucleusiq-gemini $VERSION not on PyPI — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check nucleusiq-anthropic
        id: anthropic
        run: |
          VERSION=$(python -c "
          import re
          with open('src/providers/llms/anthropic/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/nucleusiq-anthropic/${VERSION}/json")

          if [ "$STATUS" = "200" ]; then
            echo "nucleusiq-anthropic $VERSION already on PyPI — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "nucleusiq-anthropic $VERSION not on PyPI — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check nucleusiq-groq
        id: groq
        run: |
          VERSION=$(python -c "
          import re
          with open('src/providers/inference/groq/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/nucleusiq-groq/${VERSION}/json")

          if [ "$STATUS" = "200" ]; then
            echo "nucleusiq-groq $VERSION already on PyPI — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "nucleusiq-groq $VERSION not on PyPI — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check nucleusiq-ollama
        id: ollama
        run: |
          VERSION=$(python -c "
          import re
          with open('src/providers/inference/ollama/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/nucleusiq-ollama/${VERSION}/json")

          if [ "$STATUS" = "200" ]; then
            echo "nucleusiq-ollama $VERSION already on PyPI — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "nucleusiq-ollama $VERSION not on PyPI — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check nucleusiq-mcp
        id: mcp
        run: |
          VERSION=$(python -c "
          import re
          with open('src/providers/tools/mcp/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/nucleusiq-mcp/${VERSION}/json")

          if [ "$STATUS" = "200" ]; then
            echo "nucleusiq-mcp $VERSION already on PyPI — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "nucleusiq-mcp $VERSION not on PyPI — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Publish core package ────────────────────────────────────────────
  publish-core:
    name: "Publish nucleusiq ${{ needs.check-versions.outputs.core-version }} to PyPI"
    runs-on: ubuntu-latest
    needs: check-versions
    if: needs.check-versions.outputs.publish-core == 'true'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: src/nucleusiq
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/nucleusiq/dist/

  # ── Publish OpenAI provider ────────────────────────────────────────
  publish-openai:
    name: "Publish nucleusiq-openai ${{ needs.check-versions.outputs.openai-version }} to PyPI"
    runs-on: ubuntu-latest
    needs: [check-versions, publish-core]
    if: |
      always() &&
      needs.check-versions.outputs.publish-openai == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: src/providers/llms/openai
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/providers/llms/openai/dist/

  # ── Publish Gemini provider ──────────────────────────────────────
  publish-gemini:
    name: "Publish nucleusiq-gemini ${{ needs.check-versions.outputs.gemini-version }} to PyPI"
    runs-on: ubuntu-latest
    needs: [check-versions, publish-core]
    if: |
      always() &&
      needs.check-versions.outputs.publish-gemini == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: src/providers/llms/gemini
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/providers/llms/gemini/dist/

  # ── Publish Anthropic provider ────────────────────────────────────
  publish-anthropic:
    name: "Publish nucleusiq-anthropic ${{ needs.check-versions.outputs.anthropic-version }} to PyPI"
    runs-on: ubuntu-latest
    needs: [check-versions, publish-core]
    if: |
      always() &&
      needs.check-versions.outputs.publish-anthropic == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: src/providers/llms/anthropic
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/providers/llms/anthropic/dist/

  # ── Publish Groq provider ───────────────────────────────────────────
  publish-groq:
    name: "Publish nucleusiq-groq ${{ needs.check-versions.outputs.groq-version }} to PyPI"
    runs-on: ubuntu-latest
    needs: [check-versions, publish-core]
    if: |
      always() &&
      needs.check-versions.outputs.publish-groq == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: src/providers/inference/groq
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/providers/inference/groq/dist/

  # ── Publish Ollama provider ──────────────────────────────────────────
  publish-ollama:
    name: "Publish nucleusiq-ollama ${{ needs.check-versions.outputs.ollama-version }} to PyPI"
    runs-on: ubuntu-latest
    needs: [check-versions, publish-core]
    if: |
      always() &&
      needs.check-versions.outputs.publish-ollama == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: src/providers/inference/ollama
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/providers/inference/ollama/dist/

  # ── Publish MCP tool adapter ────────────────────────────────────────
  publish-mcp:
    name: "Publish nucleusiq-mcp ${{ needs.check-versions.outputs.mcp-version }} to PyPI"
    runs-on: ubuntu-latest
    needs: [check-versions, publish-core]
    if: |
      always() &&
      needs.check-versions.outputs.publish-mcp == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: src/providers/tools/mcp
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/providers/tools/mcp/dist/
