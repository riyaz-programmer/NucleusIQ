name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────
jobs:

  # ── Core package tests ──────────────────────────────────────────────
  test-core:
    name: "Core (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: src/nucleusiq

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-core-${{ matrix.python-version }}-${{ hashFiles('src/nucleusiq/pyproject.toml') }}
          restore-keys: pip-core-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[clustering]"
          pip install pytest pytest-asyncio pytest-cov pytest-mock scikit-learn

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --import-mode=importlib \
            --override-ini="addopts=" \
            --cov=nucleusiq --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-core
          path: src/nucleusiq/coverage.xml

  # ── OpenAI provider tests ───────────────────────────────────────────
  test-openai:
    name: "OpenAI (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: src/providers/llms/openai

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-openai-${{ matrix.python-version }}-${{ hashFiles('src/providers/llms/openai/pyproject.toml') }}
          restore-keys: pip-openai-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../../nucleusiq
          pip install -e "."
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --override-ini="addopts=" \
            --cov=nucleusiq_openai --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-openai
          path: src/providers/llms/openai/coverage.xml

  # ── Gemini provider tests ──────────────────────────────────────────
  test-gemini:
    name: "Gemini (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: src/providers/llms/gemini

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-gemini-${{ matrix.python-version }}-${{ hashFiles('src/providers/llms/gemini/pyproject.toml') }}
          restore-keys: pip-gemini-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../../nucleusiq
          pip install -e "."
          pip install pytest pytest-asyncio pytest-cov pytest-mock python-dotenv

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -q --tb=short \
            --override-ini="addopts=" \
            --cov=nucleusiq_gemini --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gemini
          path: src/providers/llms/gemini/coverage.xml

  # ── Anthropic provider tests ───────────────────────────────────────
  test-anthropic:
    name: "Anthropic (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: src/providers/llms/anthropic

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-anthropic-${{ matrix.python-version }}-${{ hashFiles('src/providers/llms/anthropic/pyproject.toml') }}
          restore-keys: pip-anthropic-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../../nucleusiq
          pip install -e "."
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --override-ini="addopts=" \
            --cov=nucleusiq_anthropic --cov-report=xml:coverage.xml \
            --cov-fail-under=95

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-anthropic
          path: src/providers/llms/anthropic/coverage.xml

  # ── Groq provider tests ───────────────────────────────────────────
  test-groq:
    name: "Groq (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: src/providers/inference/groq

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-groq-${{ matrix.python-version }}-${{ hashFiles('src/providers/inference/groq/pyproject.toml') }}
          restore-keys: pip-groq-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../../nucleusiq
          pip install -e "."
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --override-ini="addopts=" \
            -m "not integration" \
            --cov=nucleusiq_groq --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-groq
          path: src/providers/inference/groq/coverage.xml

  # ── Ollama provider tests ──────────────────────────────────────────
  test-ollama:
    name: "Ollama (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: src/providers/inference/ollama

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-ollama-${{ matrix.python-version }}-${{ hashFiles('src/providers/inference/ollama/pyproject.toml') }}
          restore-keys: pip-ollama-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../../nucleusiq
          pip install -e "."
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --override-ini="addopts=" \
            -m "not integration" \
            --cov=nucleusiq_ollama --cov-report=xml:coverage.xml \
            --cov-fail-under=95

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ollama
          path: src/providers/inference/ollama/coverage.xml

  # ── MCP tool adapter tests ─────────────────────────────────────────
  test-mcp:
    name: "MCP (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: src/providers/tools/mcp

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-mcp-${{ matrix.python-version }}-${{ hashFiles('src/providers/tools/mcp/pyproject.toml') }}
          restore-keys: pip-mcp-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../../nucleusiq
          pip install -e "."
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run unit tests with coverage
        # Skip ``-m integration`` here — those need Node.js + npx and the
        # reference server; they run in the dedicated test-mcp-integration
        # job below on push to main only.
        run: |
          python -m pytest tests/unit -q --tb=short \
            --override-ini="addopts=" \
            -m "not integration" \
            --cov=nucleusiq_mcp --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-mcp
          path: src/providers/tools/mcp/coverage.xml

  # ── MCP live integration tests (Node.js + reference server) ──────────
  test-mcp-integration:
    name: "MCP integration (live server)"
    runs-on: ubuntu-latest
    # Only run on pushes to main + manual dispatch — npx-driven; ~30s wall
    # time + slightly flakier than pure unit tests.  Don't gate every PR.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: src/providers/tools/mcp

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../../nucleusiq
          pip install -e "."
          pip install -e ../../llms/anthropic
          pip install pytest pytest-asyncio pytest-mock python-dotenv

      - name: Run live integration tests
        # ``test_with_anthropic.py`` auto-skips if ANTHROPIC_API_KEY is
        # unset — transport tests still run against the local reference
        # server.  Configure ANTHROPIC_API_KEY as a repo / environment
        # secret to exercise the Claude end-to-end path.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m pytest tests/integration -m integration -v \
            --override-ini="addopts="

  # ── uv install verification ────────────────────────────────────────
  test-uv:
    name: "uv install check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Core — uv sync + test
        working-directory: src/nucleusiq
        run: |
          uv venv
          uv sync --all-groups
          uv run pytest tests/ -q --tb=short -x --import-mode=importlib --override-ini="addopts="

      - name: OpenAI — uv sync + test
        working-directory: src/providers/llms/openai
        run: |
          uv venv
          uv sync --all-groups
          uv run pytest tests/ -q --tb=short -x --override-ini="addopts="

      - name: Gemini — uv sync + test
        working-directory: src/providers/llms/gemini
        run: |
          uv venv
          uv sync --all-groups
          uv run pytest tests/unit/ -q --tb=short -x --override-ini="addopts="

      - name: Anthropic — uv sync + test
        working-directory: src/providers/llms/anthropic
        run: |
          uv venv
          uv sync --group full
          uv run pytest tests/ -q --tb=short -x --override-ini="addopts="

      - name: Groq — uv sync + test
        working-directory: src/providers/inference/groq
        run: |
          uv venv
          uv sync --group dev
          uv run pytest tests/ -q --tb=short -x

      - name: Ollama — uv sync + test
        working-directory: src/providers/inference/ollama
        run: |
          uv venv
          uv sync --group dev
          uv run pytest tests/ -q --tb=short -x

      - name: MCP — uv sync + unit tests
        working-directory: src/providers/tools/mcp
        run: |
          uv venv
          uv sync --group dev
          uv run pytest tests/unit -q --tb=short -x -m "not integration" --override-ini="addopts="

  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (linting)
        run: ruff check src/ --config ruff.toml --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ --config ruff.toml

  # ── Type check (Pyrefly) ──────────────────────────────────────────
  type-check:
    name: Type check (Pyrefly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pyrefly
        run: pip install pyrefly

      - name: Install all packages (strict editable for import resolution)
        run: |
          pip install -e src/nucleusiq --config-settings editable_mode=strict
          pip install -e src/providers/llms/openai --config-settings editable_mode=strict
          pip install -e src/providers/llms/gemini --config-settings editable_mode=strict
          pip install -e src/providers/llms/anthropic --config-settings editable_mode=strict
          pip install -e src/providers/inference/groq --config-settings editable_mode=strict
          pip install -e src/providers/inference/ollama --config-settings editable_mode=strict
          pip install -e src/providers/tools/mcp --config-settings editable_mode=strict

      - name: "Pyrefly: Core"
        working-directory: src/nucleusiq
        run: pyrefly check --output-format=github

      - name: "Pyrefly: OpenAI provider"
        working-directory: src/providers/llms/openai
        run: pyrefly check --output-format=github

      - name: "Pyrefly: Gemini provider"
        working-directory: src/providers/llms/gemini
        run: pyrefly check --output-format=github

      - name: "Pyrefly: Anthropic provider"
        working-directory: src/providers/llms/anthropic
        run: pyrefly check --output-format=github

      - name: "Pyrefly: Groq provider"
        working-directory: src/providers/inference/groq
        run: pyrefly check --output-format=github

      - name: "Pyrefly: Ollama provider"
        working-directory: src/providers/inference/ollama
        run: pyrefly check --output-format=github

      - name: "Pyrefly: MCP tool adapter"
        working-directory: src/providers/tools/mcp
        run: pyrefly check --output-format=github

  # ── Import check — verify all public exports work ──────────────────
  import-check:
    name: Import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify package layout (core + hatch providers on disk)
        run: python scripts/verify_core_package_layout.py

      - name: Install packages
        run: |
          pip install -e src/nucleusiq
          pip install -e src/providers/llms/openai
          pip install -e src/providers/llms/gemini
          pip install -e src/providers/llms/anthropic
          pip install -e src/providers/inference/groq
          pip install -e src/providers/inference/ollama
          pip install -e src/providers/tools/mcp

      - name: Verify core imports
        run: |
          python -c "
          from nucleusiq.agents import Agent, BaseAgent, ReActAgent, Task, Plan
          from nucleusiq.agents.config import AgentConfig, ExecutionMode, AgentState
          from nucleusiq.agents.modes import DirectMode, StandardMode, AutonomousMode
          from nucleusiq.agents.components import Executor
          from nucleusiq.agents.components.validation import ValidationPipeline
          from nucleusiq.agents.components.progress import ExecutionProgress
          from nucleusiq.llms import BaseLLM, MockLLM, LLMParams
          from nucleusiq.llms.errors import (
              NucleusIQError, LLMError, AuthenticationError, RateLimitError,
              InvalidRequestError, ModelNotFoundError, ContentFilterError,
              ProviderServerError, ProviderConnectionError, ProviderError,
          )
          from nucleusiq.tools import BaseTool
          from nucleusiq.memory import BaseMemory, MemoryFactory, MemoryStrategy
          from nucleusiq.plugins import BasePlugin, PluginManager, PluginHalt
          from nucleusiq.plugins.builtin import (
              ModelCallLimitPlugin, ToolCallLimitPlugin, ToolRetryPlugin,
              ModelFallbackPlugin, PIIGuardPlugin, HumanApprovalPlugin,
              ContextWindowPlugin, ToolGuardPlugin, ResultValidatorPlugin,
          )
          from nucleusiq.prompts import PromptFactory, PromptTechnique
          print('All core imports OK')
          "

      - name: Verify OpenAI imports
        run: |
          python -c "
          from nucleusiq_openai import BaseOpenAI, OpenAITool, OpenAILLMParams
          print('All OpenAI imports OK')
          "

      - name: Verify Gemini imports
        run: |
          python -c "
          from nucleusiq_gemini import BaseGemini, GeminiTool, GeminiLLMParams
          print('All Gemini imports OK')
          "

      - name: Verify Anthropic imports
        run: |
          python -c "
          from nucleusiq_anthropic import (
              BaseAnthropic,
              AnthropicLLMParams,
              NATIVE_TOOL_TYPES,
              to_anthropic_tool_definition,
              build_anthropic_output_config,
              parse_anthropic_response,
          )
          print('All Anthropic imports OK')
          "

      - name: Verify Groq imports
        run: |
          python -c "
          from nucleusiq_groq import BaseGroq, GroqLLMParams
          print('All Groq imports OK')
          "

      - name: Verify Ollama imports
        run: |
          python -c "
          from nucleusiq_ollama import BaseOllama, OllamaLLMParams, ThinkLevel
          print('All Ollama imports OK')
          "

      - name: Verify MCP tool adapter imports
        run: |
          python -c "
          from nucleusiq_mcp import (
              MCPTool,
              MCPBoundTool,
              MCPSession,
              MCPServerConfig,
              MCPSchemaAdapter,
              BearerAuth,
              OAuthAuth,
              EnvAuth,
              mcp_tool_filter,
          )
          print('All MCP tool adapter imports OK')
          "

  # ── Security — check for vulnerabilities ────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check dependencies for vulnerabilities
        run: |
          pip install pip-audit
          pip install -e src/nucleusiq -e src/providers/llms/openai -e src/providers/llms/gemini -e src/providers/llms/anthropic -e src/providers/inference/groq -e src/providers/inference/ollama -e src/providers/tools/mcp
          pip-audit || true

  # ── Build verification ──────────────────────────────────────────────
  build:
    name: "Build ${{ matrix.package }}"
    runs-on: ubuntu-latest
    needs: [test-core, test-openai, test-gemini, test-anthropic, test-groq, test-ollama, test-mcp, lint, type-check, import-check]
    strategy:
      matrix:
        include:
          - package: nucleusiq
            path: src/nucleusiq
          - package: nucleusiq-openai
            path: src/providers/llms/openai
          - package: nucleusiq-gemini
            path: src/providers/llms/gemini
          - package: nucleusiq-anthropic
            path: src/providers/llms/anthropic
          - package: nucleusiq-groq
            path: src/providers/inference/groq
          - package: nucleusiq-ollama
            path: src/providers/inference/ollama
          - package: nucleusiq-mcp
            path: src/providers/tools/mcp

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist + wheel
        working-directory: ${{ matrix.path }}
        run: python -m build

      - name: Verify with twine
        working-directory: ${{ matrix.path }}
        run: twine check dist/*

      - name: Smoke-test nucleusiq wheel (non-editable install)
        if: matrix.package == 'nucleusiq'
        working-directory: ${{ matrix.path }}
        run: |
          python -m venv /tmp/nucleusiq-wheel-smoke
          /tmp/nucleusiq-wheel-smoke/bin/pip install --upgrade pip
          /tmp/nucleusiq-wheel-smoke/bin/pip install dist/*.whl
          /tmp/nucleusiq-wheel-smoke/bin/python -c "
          import nucleusiq.tools.builtin
          from nucleusiq.agents.agent import Agent
          from nucleusiq.tools import tool, BaseTool
          print('Wheel smoke test OK')
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.package }}
          path: ${{ matrix.path }}/dist/
